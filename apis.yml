    contact:
      - FN: Amazon Web Services
        url: https://aws.amazon.com/contact-us/
    features:
      - name: Automated Backup Scheduling
        description: >-
          Create backup plans with cron-based schedules to automatically back up
          AWS resources on a defined cadence with configurable start and completion windows.
      - name: Lifecycle Management
        description: >-
          Automatically transition recovery points from warm to cold storage and
          delete them after configurable retention periods to optimize costs.
      - name: Cross-Region Copy
        description: >-
          Copy recovery points to backup vaults in other AWS regions for
          disaster recovery and geographic redundancy.
      - name: Cross-Account Management
        description: >-
          Centrally manage backup policies across multiple AWS accounts within
          an AWS Organizations structure.
      - name: Vault Lock (WORM)
        description: >-
          Enforce write-once-read-many protection on backup vaults to prevent
          deletion or modification of recovery points, supporting regulatory compliance.
      - name: Legal Holds
        description: >-
          Preserve recovery points from deletion during legal discovery or
          compliance investigations with legal hold policies.
      - name: Compliance Frameworks
        description: >-
          Create compliance frameworks with controls that automatically evaluate
          backup configurations against governance requirements.
      - name: Automated Restore Testing
        description: >-
          Schedule periodic automated restore tests to validate backup
          recoverability and generate compliance reports.
      - name: Continuous Backup (PITR)
        description: >-
          Enable point-in-time recovery for supported services, allowing restore
          to any second within the retention window.
    useCases:
      - name: Enterprise Backup Automation
        description: >-
          Automate backup policies across all AWS resources with tag-based
          selection rules and centralized management.
      - name: Regulatory Compliance
        description: >-
          Meet compliance requirements for data retention with Vault Lock,
          compliance frameworks, and automated reporting.
      - name: Disaster Recovery
        description: >-
          Replicate backups cross-region and validate restore procedures
          with automated restore testing plans.
      - name: Legal Hold Management
        description: >-
          Preserve backup data during legal proceedings or investigations
          with automated legal hold policies.
    integrations:
      - name: Amazon CloudWatch
        description: Monitor backup metrics and create alarms for backup failures
      - name: Amazon EventBridge
        description: React to backup events with event-driven workflows
      - name: AWS CloudTrail
        description: Audit backup activity with consolidated CloudTrail logs
      - name: Amazon SNS
        description: Receive backup event notifications via Amazon Simple Notification Service
      - name: AWS Organizations
        description: Apply backup policies centrally across organization accounts
      - name: AWS KMS
        description: Encrypt backup vaults with customer-managed KMS keys
