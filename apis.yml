name: Amazon Backup
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
specificationVersion: '0.19'
description: >-
  AWS Backup is a fully managed backup service that centralizes and automates
  the backup of data across AWS services, enabling you to configure backup
  policies, monitor backup activity, and restore resources with a single,
  unified console and API. It supports automated backup schedules, lifecycle
  management, cross-region copy, Vault Lock for WORM compliance, legal holds,
  compliance frameworks, and automated restore testing.
