notes: >-
  AWS Backup does not ship a dedicated single-purpose client library; it is
  accessed through the first-party AWS SDKs (one service client per language)
  and the AWS CLI. Entries below are the official AWS SDK service clients /
  umbrella SDKs that expose the AWS Backup API.
packages:
