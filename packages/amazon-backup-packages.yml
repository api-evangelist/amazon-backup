    install: "implementation 'software.amazon.awssdk:backup'"
    official: true
  - language: cli
    registry: pypi
    name: awscli
    url: https://pypi.org/project/awscli/
    install: pip install awscli
    official: true
    notes: AWS CLI "aws backup" command group. See https://docs.aws.amazon.com/cli/latest/reference/backup/
