    registry: npm
    name: "@aws-sdk/client-backup"
    url: https://www.npmjs.com/package/@aws-sdk/client-backup
    install: npm install @aws-sdk/client-backup
    official: true
  - language: python
    registry: pypi
    name: boto3
    url: https://pypi.org/project/boto3/
    install: pip install boto3
    official: true
    notes: AWS SDK for Python; exposes the "backup" service client.
  - language: ruby
    registry: rubygems
    name: aws-sdk-backup
    url: https://rubygems.org/gems/aws-sdk-backup
    install: gem install aws-sdk-backup
    official: true
  - language: dotnet
    registry: nuget
    name: AWSSDK.Backup
    url: https://www.nuget.org/packages/AWSSDK.Backup
    install: dotnet add package AWSSDK.Backup
    official: true
  - language: go
    registry: pkg.go.dev
    name: github.com/aws/aws-sdk-go-v2/service/backup
    url: https://pkg.go.dev/github.com/aws/aws-sdk-go-v2/service/backup
    install: go get github.com/aws/aws-sdk-go-v2/service/backup
    official: true
  - language: java
    registry: maven
    name: software.amazon.awssdk:backup
